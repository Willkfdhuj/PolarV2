
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar V2 Settings</title>

<link rel="icon" href="favicon.ico">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(to bottom,#001f3f,#0099cc);
    color:white;
    min-height:100vh;
    text-align:center;
    overflow-x:hidden;
}

.snowflake{
    position:fixed;
    top:-10px;
    color:white;
    pointer-events:none;
    z-index:0;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-10px);
    }
    to{
        transform:translateY(110vh);
    }
}

header{
    padding:20px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(10px);
    position:relative;
    z-index:2;
}

h1{
    color:#dff6ff;
    text-shadow:0 0 15px #7ddfff;
}

nav{
    margin-top:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:5px;
    padding:10px 20px;
    background:#00bfff;
    border-radius:10px;
    display:inline-block;
    transition:.2s;
}

nav a:hover{
    background:#7ddfff;
    color:#00334d;
}

.settings-box{
    max-width:700px;
    margin:40px auto;
    padding:30px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    border-radius:15px;
    position:relative;
    z-index:2;
}

.section{
    margin-top:25px;
}

.section h2{
    margin-bottom:10px;
}

input,
select{
    width:90%;
    max-width:450px;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00bfff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#7ddfff;
    color:#00334d;
}

.info{
    margin-top:20px;
    color:#dff6ff;
    font-size:14px;
}

footer{
    padding:20px;
    color:#dff6ff;
    position:relative;
    z-index:2;
}
</style>
</head>

<body>

<header>
    <h1>⚙️ Polar V2 Settings ⚙️</h1>

    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="games.html">🎮 Games</a>
        <a href="https://discord.gg/kvTCs2QPev" target="_blank">💬 Discord</a>
        <a href="apps.html">🌐 Apps</a>
        <a href="settings.html">⚙️ Settings</a>
    </nav>
</header>

<div class="settings-box">

    <div class="section">
        <h2>✏️ Custom Site Name</h2>

        <input
            type="text"
            id="siteName"
            placeholder="Enter a custom tab name">

        <br>

        <button onclick="changeSiteName()">
            Save Site Name
        </button>
    </div>

    <div class="section">
        <h2>🥸 Tab Cloak</h2>

        <select id="cloakSelect">
            <option value="">Choose a cloak</option>
            <option value="google">Google</option>
            <option value="classroom">Google Classroom</option>
            <option value="docs">Google Docs</option>
            <option value="drive">Google Drive</option>
            <option value="Schoology">Schoology</option>
            <option value="Clever">Clever</option>
        </select>

        <br>

        <button onclick="applyCloak()">
            Apply Cloak
        </button>
    </div>

    <div class="section">
        <h2>🔄 Reset Settings</h2>

        <button onclick="resetSettings()">
            Reset Everything
        </button>
    </div>

    <div class="info">
        Settings are saved in your browser automatically.
    </div>

</div>

<footer>
    Polar V2 © 2026
</footer>

<script>
(function(){
    const title = localStorage.getItem("polarTitle");
    const icon = localStorage.getItem("polarFavicon");

    if(title){
        document.title = title;
    }

    if(icon){
        let link = document.querySelector("link[rel='icon']");

        if(!link){
            link = document.createElement("link");
            link.rel = "icon";
            document.head.appendChild(link);
        }

        link.href = icon;
    }
})();

function changeSiteName(){

    const name = document.getElementById("siteName").value.trim();

    if(!name){
        alert("Enter a site name.");
        return;
    }

    document.title = name;
    localStorage.setItem("polarTitle", name);

    alert("Site name saved!");
}

function applyCloak(){

    const cloak = document.getElementById("cloakSelect").value;

    let title = "";
    let favicon = "";

    switch(cloak){

        case "google":
            title = "Google";
            favicon = "https://www.google.com/favicon.ico";
            break;

        case "classroom":
            title = "Classes";
            favicon = "https://ssl.gstatic.com/classroom/favicon.png";
            break;

        case "docs":
            title = "Google Docs";
            favicon = "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico";
            break;

        case "drive":
            title = "My Drive";
            favicon = "https://ssl.gstatic.com/images/branding/product/2x/drive_2020q4_32dp.png";
            break;
            
             case "Schoology":
            title = "Schoology";
            favicon = "https://mukilteo.schoology.com/";
            break;

             case "Clever":
            title = "Clever";
            favicon = "clever.com";
            break;

        default:
            alert("Choose a cloak first.");
            return;
    }

    document.title = title;

    localStorage.setItem("polarTitle", title);
    localStorage.setItem("polarFavicon", favicon);

    let link = document.querySelector("link[rel='icon']");

    if(!link){
        link = document.createElement("link");
        link.rel = "icon";
        document.head.appendChild(link);
    }

    link.href = favicon;

    alert("Cloak applied!");
}

function resetSettings(){

    localStorage.removeItem("polarTitle");
    localStorage.removeItem("polarFavicon");

    alert("Settings reset. Refresh the page.");
}

function createSnowflake(){

    const snow = document.createElement("div");

    snow.className = "snowflake";
    snow.textContent = "❄";

    snow.style.left = Math.random() * 100 + "vw";
    snow.style.fontSize = (10 + Math.random() * 20) + "px";
    snow.style.animationDuration = (4 + Math.random() * 4) + "s";
    snow.style.opacity = Math.random();

    document.body.appendChild(snow);

    setTimeout(() => {
        snow.remove();
    }, 9000);
}

setInterval(createSnowflake, 250);
</script>

</body>
</html>
