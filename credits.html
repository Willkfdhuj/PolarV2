<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar V2 - Credits</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background: linear-gradient(to bottom, #001f3f, #0099cc);
    color:white;
    min-height:100vh;
    text-align:center;
    overflow-x:hidden;
}

/* ❄ Snow */
.snowflake{
    position: fixed;
    top: -10px;
    color: white;
    opacity: 0.8;
    pointer-events:none;
    z-index:0;
    animation: fall linear infinite;
}

@keyframes fall{
    0% { transform: translateY(-10px); }
    100% { transform: translateY(110vh); }
}

/* Header */
header{
    background:rgba(255,255,255,0.1);
    padding:20px;
    backdrop-filter:blur(10px);
    position:relative;
    z-index:2;
}

h1{
    font-size:3rem;
    color:#dff6ff;
    text-shadow:0 0 25px #7ddfff;
}

nav{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:white;

    background:rgba(120,190,255,0.9);
    backdrop-filter:blur(10px);

    padding:14px 28px;
    border-radius:14px;

    font-weight:700;
    font-size:15px;

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 4px 15px rgba(0,0,0,0.2),
        0 0 10px rgba(125,223,255,0.15);

    transition:all .25s ease;
}

nav a:hover{
    transform:translateY(-3px);

    background:#7ddfff;
    color:#00334d;

    box-shadow:
        0 0 20px rgba(125,223,255,0.7),
        0 0 40px rgba(125,223,255,0.3);
}

nav a.active{
    background:linear-gradient(
        135deg,
        #8fdfff,
        #5bbfff
    );

    box-shadow:
        0 0 25px rgba(125,223,255,0.8);
}

/* Credits Box */
.credits-box{
    margin:100px auto;
    width:500px;
    padding:25px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;

    box-shadow:0 0 15px rgba(125,223,255,0.15);
}

.credits-box h2{
    margin-bottom:15px;
    text-shadow:0 0 20px #7ddfff;
}

.credits-box p{
    margin:10px 0;
    font-size:18px;
}

/* Footer */
footer{
    position:fixed;
    bottom:0;
    width:100%;
    padding:15px;
    background:rgba(255,255,255,0.1);
    z-index:2;
}
</style>
</head>

<body>

<header>
  <h1><strong>❄ Polar V2 Credits❄</strong></h1>

    <nav>
        <a href="index.html">🏠 Home</a>
      <a href="games.html">🎮 Games</a>
       <a href="https://discord.gg/kvTCs2QPev" target="_blank">💬 Discord</a>
        <a href="apps.html">📱 Apps</a>
        <a href="settings.html">⚙️ Settings</a>
        <a href="credits.html" class="active">😎 Credits</a>
    </nav>
</header>

<div class="credits-box">
    <h2>😎 Credits</h2>

    <p><strong>Creator:</strong> Will</p>
    <p><strong>Discord Manager:</strong> Wyllyia</p>
    <p><strong>Idea maker:</strong> Evan</p>
    <p><strong>Proxy:</strong> 
Mercury Workshop</p>
</div>

<footer>
    © 2026 Polar V2 • Created by Will
</footer>

<script>
function createSnowflake(){
    const snow = document.createElement("div");
    snow.classList.add("snowflake");
    snow.innerHTML = "❄";

    snow.style.left = Math.random() * window.innerWidth + "px";
    snow.style.animationDuration = (3 + Math.random() * 5) + "s";
    snow.style.fontSize = (10 + Math.random() * 20) + "px";

    document.body.appendChild(snow);

    setTimeout(() => snow.remove(), 8000);
}
setInterval(createSnowflake, 200);
</script>

</body>
</html>
