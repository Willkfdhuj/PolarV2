
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar V2 Settings</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(to bottom,#001f3f,#0099cc);
    color:white;
    min-height:100vh;
    text-align:center;
    overflow-x:hidden;
}

/* ❄ Snow Effect */
.snowflake{
    position:fixed;
    top:-10px;
    color:white;
    font-size:1em;
    opacity:.8;
    pointer-events:none;
    user-select:none;
    z-index:0;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-10px);}
    100%{transform:translateY(110vh);}
}

header{
    background:rgba(255,255,255,.1);
    padding:20px;
    backdrop-filter:blur(10px);
    position:relative;
    z-index:2;
}

h1{
    font-size:3rem;
    color:#dff6ff;
    text-shadow:0 0 15px #7ddfff;
}

.settings-box{
    max-width:650px;
    margin:40px auto;
    padding:25px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(10px);
    border-radius:15px;
    position:relative;
    z-index:2;
}

.section{
    margin-top:25px;
}

input, select{
    width:80%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00bfff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#7ddfff;
    color:#00334d;
}

.nav-btn{
    text-decoration:none;
    display:inline-block;
    margin-top:15px;
    padding:12px 25px;
    background:#00bfff;
    color:white;
    border-radius:12px;
    font-weight:bold;
}

.nav-btn:hover{
    background:#7ddfff;
    color:#00334d;
}
</style>
</head>

<body>

<header>
    <h1>⚙️ Polar V2 Settings ⚙️</h1>

    <a href="../index.html" class="nav-btn">🏠 Home</a>
</header>

<div class="settings-box">

    <div class="section">
        <h2>✏️ Site Name Changer</h2>

        <input
            type="text"
            id="siteName"
            placeholder="Enter custom site name"
        >

        <br>

        <button onclick="changeSiteName()">
            Save Site Name
        </button>
    </div>

    <div class="section">
        <h2>🥸 Tab Cloak</h2>

        <select id="cloakSelect">
            <option value="">Choose a cloak</option>
            <option value="google">Google</option>
            <option value="classroom">Google Classroom</option>
            <option value="docs">Google Docs</option>
            <option value="drive">Google Drive</option>
        </select>

        <br>

        <button onclick="applyCloak()">
            Apply Cloak
        </button>
    </div>

</div>

<script>
// Load saved title
if(localStorage.getItem("polarTitle")){
    document.title = localStorage.getItem("polarTitle");
}

// Load saved favicon
const savedIcon = localStorage.getItem("polarFavicon");

if(savedIcon){
    let link = document.querySelector("link[rel='icon']");

    if(!link){
        link = document.createElement("link");
        link.rel = "icon";
        document.head.appendChild(link);
    }

    link.href = savedIcon;
}

function changeSiteName(){
    const name = document.getElementById("siteName").value;

    if(name.trim() !== ""){
        document.title = name;
        localStorage.setItem("polarTitle", name);
        alert("Site name updated!");
    }
}

function applyCloak(){

    const cloak =
        document.getElementById("cloakSelect").value;

    let title = "";
    let favicon = "";

    if(cloak === "google"){
        title = "Google";
        favicon = "https://www.google.com/favicon.ico";
    }

    if(cloak === "classroom"){
        title = "Classes";
        favicon = "https://ssl.gstatic.com/classroom/favicon.png";
    }

    if(cloak === "docs"){
        title = "Google Docs";
        favicon = "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico";
    }

    if(cloak === "drive"){
        title = "Google Drive";
        favicon = "https://ssl.gstatic.com/images/branding/product/2x/drive_2020q4_32dp.png";
    }

    document.title = title;
    localStorage.setItem("polarTitle", title);

    let link = document.querySelector("link[rel='icon']");

    if(!link){
        link = document.createElement("link");
        link.rel = "icon";
        document.head.appendChild(link);
    }

    link.href = favicon;
    localStorage.setItem("polarFavicon", favicon);
}

/* ❄ Snow Generator */
function createSnowflake() {
    const snow = document.createElement("div");
    snow.classList.add("snowflake");
    snow.innerHTML = "❄";

    snow.style.left = Math.random() * window.innerWidth + "px";
    snow.style.animationDuration = (3 + Math.random() * 5) + "s";
    snow.style.fontSize = (10 + Math.random() * 20) + "px";
    snow.style.opacity = Math.random();

    document.body.appendChild(snow);

    setTimeout(() => {
        snow.remove();
    }, 8000);
}

setInterval(createSnowflake, 200);
</script>

</body>
</html>
