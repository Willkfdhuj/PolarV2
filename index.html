<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar V2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background: linear-gradient(to bottom, #001f3f, #0099cc);
    color:white;
    min-height:100vh;
    text-align:center;
}

header{
    background:rgba(255,255,255,0.1);
    padding:20px;
    backdrop-filter:blur(10px);
}

h1{
    font-size:3rem;
    color:#dff6ff;
    text-shadow:0 0 15px #7ddfff;
}

nav{
    margin-top:15px;
}

nav a{
    text-decoration:none;
    color:white;
    background:#00bfff;
    padding:12px 25px;
    margin:5px;
    border-radius:12px;
    display:inline-block;
    transition:.3s;
    font-weight:bold;
}

nav a:hover{
    background:#7ddfff;
    color:#00334d;
    transform:scale(1.05);
}

.hero{
    padding:100px 20px;
}

.hero h2{
    font-size:2.5rem;
    margin-bottom:15px;
}

.hero p{
    font-size:1.2rem;
    color:#dff6ff;
}

footer{
    position:fixed;
    bottom:0;
    width:100%;
    padding:15px;
    background:rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<header>
    <h1>❄ Polar V2 ❄</h1>

    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="games.html">🎮 Gam
        <a href="https://discord.gg/https://discord.gg/kvTCs2QPev" target="_blank">💬 Discord</a>
    </nav>
</header>

<section class="hero">
<h2>Welcome to Polar V2</h2>
<p>Let Polar V2 freeze up your boredom</p>

<form id="searchForm" style="margin-top:20px;">
    <input
        id="searchInput"
        type="text"
        placeholder="Enter a website (example.com)"
        style="padding:12px;width:300px;border:none;border-radius:10px;"
    >
    <button
        type="submit"
        style="padding:12px 20px;border:none;border-radius:10px;background:#00bfff;color:white;font-weight:bold;cursor:pointer;"
    >
        Open
    </button>
</form>

<div id="frameContainer" style="margin-top:20px; display:none;">
    <iframe
        id="siteFrame"
        style="width:90%;height:600px;border:none;border-radius:12px;"
    ></iframe>
</div>
<script>
document.getElementById("searchForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let url = document.getElementById("searchInput").value.trim();

    if (!url.startsWith("http://") && !url.startsWith("https://")) {
        url = "https://" + url;
    }

    document.getElementById("frameContainer").style.display = "block";
    document.getElementById("siteFrame").src = url;
});
</script>
<p>Quote! "Just because something is hard and you face obstacles doesn't mean you give up, thats called life."</p>
<footer>
    © 2026 Polar V2
</footer>

</body>
</html>
