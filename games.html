<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar V2 - Games</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom,#001f3f,#0099cc);
    color:white;
    text-align:center;
}

header{
    padding:20px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(10px);
}

h1{
    color:#dff6ff;
}

nav{
    margin-top:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:10px;
    padding:10px 20px;
    background:#00bfff;
    border-radius:10px;
    transition:.2s;
}

nav a:hover{
    background:#7ddfff;
    color:#00334d;
}

.search{
    width:90%;
    max-width:500px;
    margin:25px auto;
    padding:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
    background:rgba(255,255,255,.15);
    color:white;
    outline:none;
}

.search::placeholder{
    color:#dff6ff;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.game-card{
    background:rgba(255,255,255,.12);
    border-radius:15px;
    padding:20px;
    transition:.2s;
}

.game-card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(125,223,255,.5);
}

.game-card h3{
    margin-top:0;
}

.play-btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#7ddfff;
    color:#00334d;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:.2s;
}

.play-btn:hover{
    background:white;
}

footer{
    padding:20px;
    color:#dff6ff;
}
</style>
</head>

<body>

<header>
    <h1>❄ Polar V2 Games ❄</h1>

    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="games.html">🎮 Games</a>
        <a href="https://discord.gg/kvTCs2QPev" target="_blank">💬 Discord</a>
    </nav>
</header>

<input
class="search"
type="text"
id="search"
placeholder="Search Games..."
onkeyup="searchGames()">

    <div class="games" id="games-container"></div>
    

<footer>
    Polar V2 © 2026
</footer>

<script>
const games = [
  ["Geometry Dash","Fast Geometry Dash","Games/geometrydash/index.html"],
  ["Baseball Bros","Baseball action","Games/baseballbros/index.html"],
  ["Basketball Bros","Basketball fun","Games/basketballbros/index.html"],
  ["Football Bros","Football action","footballbros"],
  ["Soccer Bros","Soccer matches","soccerbros"],
  ["Slope","Roll down endless slopes","Games/slope/index.html"],
  ["Run 3","Run through space tunnels","run3"],
  ["Tetris","Classic block puzzle","tetris"],
  ["Snake","Grow as long as possible","snake"],
  ["2048","Combine tiles to 2048","2048"],
  ["Drift Hunters","Drift awesome cars","drifthunters"],
  ["Drive Mad","Physics driving challenge","drivemad"],
  ["Moto X3M","Bike racing levels","motox3m"],
  ["Tunnel Rush","Fast reaction tunnel game","tunnelrush"],
  ["Subway Surfers","Endless running game","subwaysurfers"],
  ["Temple Run 2","Escape the temple","templerun2"],
  ["Crossy Road","Cross roads safely","crossyroad"],
  ["Tiny Fishing","Catch fish and upgrade","tinyfishing"],
  ["Cookie Clicker","Idle clicking game","cookieclicker"],
  ["Duck Life","Train and race your duck","ducklife"],
  ["Stickman Hook","Swing through levels","stickmanhook"],
  ["Retro Bowl","Football management","retrobowl"],
  ["Rooftop Snipers","Funny sniper battles","rooftopsnipers"],
  ["Getaway Shootout","Race to the finish","getawayshootout"],
  ["Gun Mayhem","Chaotic arena battles","gunmayhem"],
  ["Fireboy and Watergirl","Co-op puzzle platformer","fireboywatergirl"],
  ["Vex 3","Challenging platforming","vex3"],
  ["Vex 4","More Vex challenges","vex4"],
  ["Vex 5","Advanced Vex levels","vex5"],
  ["Vex 6","Ultimate Vex adventure","vex6"],
  ["Vex 7","Newest Vex experience","vex7"],
  ["Paper.io 2","Capture territory","paperio2"],
  ["Shell Shockers","Egg shooter game","shellshockers"],
  ["Agar.io","Grow by consuming cells","agario"],
  ["Slither.io","Grow your snake","slitherio"],
  ["Hole.io","Swallow the city","holeio"],
  ["Minecraft Classic","Classic Minecraft","minecraftclassic"],
  ["Idle Breakout","Brick-breaking idle game","idlebreakout"],
  ["BitLife","Life simulation","bitlife"],
  ["Bloons Tower Defense","Monkey tower defense","bloonstd"],
  ["Chess","Classic chess","chess"],
  ["Checkers","Classic checkers","checkers"],
  ["Pac-Man","Arcade maze game","pacman"],
  ["Doodle Jump","Jump endlessly","doodlejump"],
  ["Flappy Bird","Simple but difficult","flappybird"],
  ["World's Hardest Game","Extremely challenging","worldshardestgame"],
  ["Happy Wheels","Physics obstacle game","happywheels"],
  ["Super Smash Flash","Platform fighter","supersmashflash"],
  ["Learn to Fly","Launch the penguin","learntofly"],
  ["Bloxorz","Puzzle block game","bloxorz"],
  ["Tank Trouble","Tank battles","tanktrouble"],
  ["HexGL","Futuristic racing","hexgl"],
  ["FNAF","Five Nights at Freddy's","fnaf"],
  ["Bad Ice Cream","Arcade multiplayer","badicecream"],
  ["Cut the Rope","Feed Om Nom","cuttherope"],
  ["Jetpack Joyride","Endless jetpack runner","jetpackjoyride"],
  ["Super Mario 63","Mario fan game","supermario63"],
  ["Among Us","Crewmate adventures","amongus"],
  ["Zombotron","Zombie action platformer","zombotron"],
  ["Earn to Die","Drive through zombies","earntodie"],
  ["Raft Wars","Funny shooting game","raftwars"]
];

const container = document.getElementById("games-container");

games.forEach(game => {
  container.innerHTML += `
    <div class="game-card">
      <h3>${game[0]}</h3>
      <p>${game[1]}</p>
      <a class="play-btn" href="${game[2]}">Play</a>
    </div>
  `;
});

function searchGames() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".game-card");

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();

        if(text.includes(input)){
            card.style.display = "";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>
</html>
