<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar V2 - Games</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom,#001f3f,#0099cc);
    color:white;
    text-align:center;
}

header{
    padding:20px;
    background:rgba(255,255,255,.1);
}

h1{
    color:#dff6ff;
}

nav a{
    color:white;
    text-decoration:none;
    margin:10px;
    padding:10px 20px;
    background:#00bfff;
    border-radius:10px;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.game-card{
    background:rgba(255,255,255,.1);
    border-radius:15px;
    padding:20px;
}

.game-card h3{
    margin-top:0;
}

.play-btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#7ddfff;
    color:#00334d;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <h1>❄ Polar V2 Games ❄</h1>

    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="games.html">🎮 Games</a>
        <a href="https://discord.gg/kvTCs2QPev" target="_blank">💬 Discord</a>
    </nav>
</header>

<div class="games">

    <div class="game-card">
        <h3>Geometry Dash</h3>
        <p>Fast Geometry Dash</p>
        <a class="play-btn" href="geometrydash.html">Play</a>
    </div>

    <div class="game-card">
        <h3>Baseball Bros</h3>
        <p>Just baseball bros</p>
        <a class="play-btn" href="https://baseballbros.io/">Play</a>
    </div>

    <div class="game-card">
        <h3>Slope</h3>
        <p>roll into slope :D.</p>
        <a class="play-btn" href="https://slopeio.org/">Play</a>
    </div>

    <div class="game-card">
        <h3>Tetris</h3>
        <p>Block game!</p>
        <a class="play-btn" href="https://onlinetetris.org/tetris-pc">Play</a>
    </div>

    <div class="game-card">
        <h3>Snake</h3>
        <p>Grow as long as possible :D</p>
        <a class="play-btn" href="https://www.google.com/fbx?fbx=snake_arcade">Play</a>
    </div>

    <div class="game-card">
        <h3>2048</h3>
        <p>Combine tiles to reach 2048.</p>
        <a class="play-btn" href="https://www.2048.org/">Play</a>
    </div>

</div>

</body>
</html>
